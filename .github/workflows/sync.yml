name: Sync World Cup Results
 
on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:          # permite correrlo a mano desde Actions
 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -s -o response.json -w "\nHTTP %{http_code}" \
            -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
            "${{ secrets.SYNC_URL }}"
          echo ""
          cat response.json
